<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Special Request</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
overflow:hidden;
}

.card{
background:rgba(255,255,255,.95);
padding:35px;
border-radius:20px;
width:90%;
max-width:400px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,.2);
animation:fade .8s;
}

h1{
color:#e91e63;
font-size:30px;
}

p{
font-size:18px;
color:#444;
}

button{
margin-top:25px;
padding:14px 30px;
font-size:18px;
border:none;
border-radius:12px;
background:#e91e63;
color:white;
cursor:pointer;
}

button:hover{
transform:scale(1.05);
}

@keyframes fade{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}
</style>

</head>

<body>

<div class="card">

<h1>💌</h1>

<p><strong>Your Mr Right sent you a special request ❤️</strong></p>

<p>Tap below when you're ready.</p>

<button onclick="window.location='step2.html'">
Open Request
</button>

</div>

</body>
</html>
