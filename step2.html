<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Select Date</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#a18cd1,#fbc2eb);
}

.card{
background:white;
padding:30px;
border-radius:20px;
width:90%;
max-width:420px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,.2);
}

h1{
color:#e91e63;
}

label{
display:block;
margin-top:15px;
font-weight:bold;
color:#333;
text-align:left;
}

input{
width:100%;
padding:12px;
margin-top:8px;
border-radius:10px;
border:1px solid #ccc;
font-size:16px;
}

button{
margin-top:25px;
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#e91e63;
color:white;
font-size:18px;
cursor:pointer;
}

button:disabled{
background:#ccc;
cursor:not-allowed;
}
</style>

</head>

<body>

<div class="card">

<h1>📅 Choose your time</h1>

<label>Select Date</label>
<input type="date" id="date">

<label>Select Time</label>
<input type="time" id="time">

<button id="next" disabled>Next ❤️</button>

</div>

<script>
const date = document.getElementById("date");
const time = document.getElementById("time");
const next = document.getElementById("next");

function check(){
if(date.value && time.value){
next.disabled = false;
} else {
next.disabled = true;
}
}

date.addEventListener("change", check);
time.addEventListener("change", check);

next.onclick = ()=>{
window.location = "step3.html";
};
</script>

</body>
</html>
